<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XUV TCF Operator Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 15px;
        }
        
        .app-container { 
            background-color: #ffffff; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        .header { 
            background: linear-gradient(135deg, #D32F2F 0%, #b71c1c 100%); 
            color: white; 
            padding: 25px 20px; 
            text-align: center; 
            font-size: 22px; 
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(211, 47, 47, 0.2);
        }

        .content { padding: 30px 25px; flex-grow: 1; }
        
        /* 🔥 NAYA BLINKING ANIMATION 🔥 */
        @keyframes dangerPulse {
            0% { transform: scale(1); background-color: #fff3e0; box-shadow: 0 0 0 0 rgba(255, 87, 34, 0.4); border-color: #ffb74d; }
            50% { transform: scale(1.02); background-color: #ffebee; box-shadow: 0 0 20px 0px rgba(211, 47, 47, 0.3); border-color: #e57373; }
            100% { transform: scale(1); background-color: #fff3e0; box-shadow: 0 0 0 0 rgba(255, 87, 34, 0); border-color: #ffb74d; }
        }

        .salary-box { 
            background: #fff3e0; 
            border: 2px solid #ffb74d; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 25px; 
            display: none; 
            animation: dangerPulse 1.2s infinite ease-in-out; 
        }
        
        .salary-text { 
            color: #c62828; 
            font-size: 18px; 
            font-weight: 800; 
            display: block;
            margin-bottom: 5px;
        }

        .salary-subtext {
            color: #555;
            font-size: 12px;
            font-weight: 600;
        }
        
        label { 
            font-size: 13px; 
            color: #777; 
            font-weight: 600; 
            margin-bottom: 8px; 
            display: block; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 25px; 
            background-color: #f8f9fa;
            border: 2px solid #e9ecef; 
            border-radius: 12px; 
            font-size: 16px; 
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: #333;
            transition: all 0.3s ease;
            outline: none;
            -webkit-appearance: none; /* Removes default iOS styling */
        }

        input:focus, select:focus {
            border-color: #D32F2F;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.1);
        }

        /* Standardize Buttons */
        button {
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-family: 'Poppins', sans-serif;
            font-weight: 800; 
            cursor: pointer; 
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            letter-spacing: 0.5px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-absent { 
            background: linear-gradient(135deg, #e53935 0%, #c62828 100%); 
            color: white; 
            box-shadow: 0 6px 15px rgba(229, 57, 53, 0.3);
        }

        .btn-quick { 
            background: linear-gradient(135deg, #43a047 0%, #2e7d32 100%); 
            color: white; 
            display: none; 
            margin-bottom: 12px;
            box-shadow: 0 6px 15px rgba(67, 160, 71, 0.3);
        }

        .btn-undo { 
            background: linear-gradient(135deg, #fb8c00 0%, #ef6c00 100%); 
            color: white; 
            display: none; 
            margin-bottom: 10px;
            box-shadow: 0 6px 15px rgba(251, 140, 0, 0.3);
        }

        .divider {
            height: 2px;
            background-color: #f0f2f5;
            margin: 30px 0;
            border-radius: 2px;
        }

        .btn-withdraw { 
            background: transparent; 
            color: #546e7a; 
            border: 2px solid #cfd8dc;
            padding: 14px; 
        }

        .btn-withdraw:active {
            background: #eceff1;
        }

        #timer-msg { 
            text-align: center; 
            color: #D32F2F; 
            font-weight: 800; 
            margin-bottom: 15px; 
            display: none; 
            font-size: 15px; 
            background: #ffebee;
            padding: 10px;
            border-radius: 8px;
        }

        #status-msg { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 14px; 
            font-weight: 600;
            padding: 12px; 
            border-radius: 8px; 
            display: none; 
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">XUV TCF Attendance</div>
    <div class="content">
        <div id="loss-indicator" class="salary-box">
            <span class="salary-text">⚠️ TODAY'S LOSS: ₹600</span>
           
        </div>

        <label for="token">Token Number</label>
        <input type="text" id="token" placeholder="e.g. T101" autocomplete="off">

        <div id="form-controls">
            <label for="reason">Reason for Leave</label>
            <select id="reason">
                <option value="Sick Leave ">Sick Leave </option>
                <option value="Personal Leave ">Personal Leave </option>
                <option value="Emergency">Emergency</option>
            </select>

            <button id="absent-btn" class="btn-absent" onclick="startUndoTimer()">MARK ABSENT</button>
        </div>

        <div id="timer-msg">Locking in <span id="seconds">30</span>s...</div>
        <button id="quick-btn" class="btn-quick" onclick="finalizeAbsent()">CONFIRM NOW (Skip Wait)</button>
        <button id="undo-btn" class="btn-undo" onclick="cancelAbsent()">UNDO / CANCEL</button>

        <div class="divider"></div>

        <button class="btn-withdraw" onclick="submitAction('withdraw')">WITHDRAW OLD LEAVE</button>
        
        <div id="status-msg"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzg44SKe6YD-xk4NCdL8vJZUfWY94iZMY4GEl9ItMxw8Ywdb8aLCr3Gfy1e4wf2hcAf/exec"; 
    
    let countdown;
    let secondsLeft = 30;

    function startUndoTimer() {
        let token = document.getElementById('token').value.trim();
        if(!token) { alert("Please enter your Token Number!"); return; }

        document.getElementById('absent-btn').style.display = 'none';
        document.getElementById('loss-indicator').style.display = 'block';
        document.getElementById('quick-btn').style.display = 'block';
        document.getElementById('undo-btn').style.display = 'block';
        document.getElementById('timer-msg').style.display = 'block';
        
        secondsLeft = 30;
        document.getElementById('seconds').innerText = secondsLeft;

        countdown = setInterval(() => {
            secondsLeft--;
            document.getElementById('seconds').innerText = secondsLeft;
            if (secondsLeft <= 0) {
                clearInterval(countdown);
                finalizeAbsent();
            }
        }, 1000);
    }

    function cancelAbsent() {
        clearInterval(countdown);
        alert("Absent Cancelled! ₹600 Bach Gaye. 💰");
        resetUI();
    }

    function finalizeAbsent() {
        clearInterval(countdown); 
        document.getElementById('quick-btn').style.display = 'none';
        document.getElementById('undo-btn').style.display = 'none';
        document.getElementById('timer-msg').innerText = "Sending Final Entry...";
        submitAction('markAbsent');
    }

    function resetUI() {
        document.getElementById('absent-btn').style.display = 'block';
        document.getElementById('loss-indicator').style.display = 'none';
        document.getElementById('quick-btn').style.display = 'none';
        document.getElementById('undo-btn').style.display = 'none';
        document.getElementById('timer-msg').style.display = 'none';
        document.getElementById('timer-msg').innerHTML = 'Locking in <span id="seconds">30</span>s...';
    }

    function submitAction(actionType) {
        let token = document.getElementById('token').value.trim();
        let reason = document.getElementById('reason').value;
        let statusBox = document.getElementById('status-msg');

        statusBox.style.display = "block";
        statusBox.style.background = "#e3f2fd";
        statusBox.style.color = "#1565c0";
        statusBox.innerText = "Processing...";

        const formData = new URLSearchParams();
        formData.append('action', actionType);
        formData.append('token', token);
        formData.append('reason', reason);

        fetch(API_URL, { method: 'POST', body: formData })
        .then(res => res.text())
        .then(data => {
            if(data.includes("Blocked") || data.includes("Error")) {
                alert("❌ FAILED!\n\n" + data);
            } else {
                alert("✅ SUCCESS!\n\n" + data);
                document.getElementById('token').value = "";
            }
            resetUI();
            statusBox.style.display = "none";
        })
        .catch(() => {
            alert("Connection Error! Check internet or API link.");
            resetUI();
        });
    }
</script>
</body>
</html>
